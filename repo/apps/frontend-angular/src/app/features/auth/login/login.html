<div class="min-h-screen bg-mesh flex flex-col items-center justify-center p-6 relative overflow-hidden">

    <!-- Background Decorative Elements -->
    <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-[#1B3C53]/5 rounded-full blur-3xl"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-[#456882]/5 rounded-full blur-3xl"></div>

    <div class="w-full max-w-md relative z-10 animate-fade-in-up">
        <div class="mb-12 text-center">
            <div class="inline-block p-4 bg-white rounded-3xl shadow-xl mb-6">
                <div class="w-12 h-12 bg-[#1B3C53] rounded-2xl flex items-center justify-center">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
                        </path>
                    </svg>
                </div>
            </div>
            <h1 class="text-5xl font-black tracking-tighter text-[#1B3C53] mb-2">
                SECURE <span class="text-gradient">ACCESS</span>
            </h1>
            <p class="text-[#456882] font-bold uppercase tracking-[0.3em] text-[10px]">Information Systems Gateway</p>
        </div>

        <app-ui-card title="AUTHENTICATION" class="!p-10">
            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-8">

                <div *ngIf="error" class="bg-red-50 border-l-4 border-red-600 p-5 rounded-2xl animate-fade-in-up">
                    <p class="text-[10px] text-red-700 font-black uppercase tracking-widest mb-1">Authorization Error
                    </p>
                    <p class="text-xs text-red-800 font-bold">{{ error }}</p>
                </div>

                <div class="space-y-6">
                    <div class="group">
                        <label
                            class="block text-[10px] font-black text-[#456882] tracking-[0.2em] uppercase mb-3 ml-1 transition-colors group-focus-within:text-[#1B3C53]">
                            Email Address
                        </label>
                        <input type="email" formControlName="email" placeholder="user@example.com" class="input-field">
                    </div>

                    <div class="group">
                        <label
                            class="block text-[10px] font-black text-[#456882] tracking-[0.2em] uppercase mb-3 ml-1 transition-colors group-focus-within:text-[#1B3C53]">
                            Security Password
                        </label>
                        <input type="password" formControlName="password" placeholder="••••••••" class="input-field">
                    </div>
                </div>

                <div class="pt-4">
                    <app-ui-button type="submit" variant="primary"
                        customClass="w-full !py-5 !text-sm shadow-xl shadow-[#1B3C53]/20" [loading]="loading"
                        [disabled]="loginForm.invalid">
                        AUTHORIZE SESSION
                    </app-ui-button>
                </div>

                <div class="text-center pt-8 border-t border-gray-100">
                    <p class="text-[10px] font-bold text-[#456882] tracking-widest uppercase mb-4">
                        New Administrator?
                        <a routerLink="/admin/register" class="text-[#1B3C53] hover:underline ml-2 font-black">Register
                            Building</a>
                    </p>
                    <div class="p-4 bg-[#F0F2F5] rounded-2xl">
                        <p class="text-[9px] font-bold text-[#456882] opacity-80 uppercase leading-relaxed">
                            * Residents must use the registration link provided by their administrator
                        </p>
                    </div>
                </div>
            </form>
        </app-ui-card>

        <p class="text-center mt-12 text-[10px] font-black text-[#456882]/40 tracking-[0.5em] uppercase">
            © 2025 INFOSYS SECURE
        </p>
    </div>

</div>
